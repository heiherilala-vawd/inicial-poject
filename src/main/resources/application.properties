spring.application.name=demo2
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=postgres
spring.datasource.password=00001111



spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC+3
spring.jackson.time-zone=Indian/Antananarivo
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.defer-datasource-initialization=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway

# JWT
jwt.secret.key=your-secret-key-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration.time=86400000

# Security
security.bcrypt.strength=10